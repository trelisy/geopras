<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOPRAS Admin Console</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .admin-header {
            background: white;
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header h1 i {
            color: #667eea;
        }

        .logout-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        /* Tabs Navigation */
        .tabs-nav {
            background: white;
            border-radius: 16px;
            padding: 8px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            color: #718096;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn:hover {
            background: #f7fafc;
            color: #4a5568;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .tab-btn i {
            font-size: 18px;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Upload Form */
        .upload-section {
            background: #f7fafc;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 32px;
            border: 2px dashed #cbd5e0;
        }

        .upload-section h3 {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-section h3 i {
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: white;
            border: 2px dashed #cbd5e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #718096;
            font-weight: 500;
        }

        .file-input-label:hover {
            border-color: #667eea;
            background: #f7fafc;
            color: #667eea;
        }

        .file-input-label i {
            font-size: 24px;
        }

        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #4a5568;
            font-weight: 500;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin-top: 16px;
        }

        .progress-bar-wrapper {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .progress-text {
            margin-top: 8px;
            font-size: 13px;
            color: #4a5568;
            font-weight: 500;
            text-align: center;
        }

        /* Upload Button */
        .upload-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .upload-btn:active {
            transform: translateY(0);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Items Grid */
        .items-section {
            margin-top: 40px;
        }

        .items-section h3 {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .items-section h3 i {
            color: #667eea;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .item-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f7fafc;
        }

        .item-card-content {
            padding: 16px;
        }

        .item-card-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-card-text {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .delete-btn {
            width: 100%;
            background: #fc8181;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .delete-btn:hover {
            background: #f56565;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
            font-weight: 500;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-left: 4px solid #48bb78;
        }

        .notification.error {
            border-left: 4px solid #f56565;
        }

        .notification i {
            font-size: 20px;
        }

        .notification.success i {
            color: #48bb78;
        }

        .notification.error i {
            color: #f56565;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .tabs-nav {
                flex-direction: column;
            }

            .items-grid {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1>
                <i class="fas fa-shield-alt"></i>
                GEOPRAS Admin Console
            </h1>
            <a href="index.html" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                Log Out
            </a>
        </div>

        <!-- Tabs Navigation -->
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('news')">
                <i class="fas fa-newspaper"></i>
                <span>ახალი ამბები</span>
            </button>
            <button class="tab-btn" onclick="switchTab('events')">
                <i class="fas fa-calendar-alt"></i>
                <span>ღონისძიებები</span>
            </button>
            <button class="tab-btn" onclick="switchTab('articles')">
                <i class="fas fa-file-alt"></i>
                <span>სტატიები</span>
            </button>
        </div>

        <!-- News Tab -->
        <div id="news-tab" class="tab-content active">
            <div class="upload-section">
                <h3><i class="fas fa-cloud-upload-alt"></i> ახალი ამბის დამატება</h3>
                <form id="news-form">
                    <div class="form-group">
                        <label class="form-label">სათაური</label>
                        <input type="text" id="news-title" class="form-input" placeholder="შეიყვანეთ სათაური..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">ტექსტი</label>
                        <textarea id="news-text" class="form-textarea" placeholder="შეიყვანეთ ტექსტი..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">სურათი</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="news-image" accept="image/*" onchange="updateFileName(this, 'news-file-name')" required>
                            <label for="news-image" class="file-input-label">
                                <i class="fas fa-image"></i>
                                <span>აირჩიეთ სურათი</span>
                            </label>
                        </div>
                        <div id="news-file-name" class="file-name"></div>
                    </div>
                    <div class="progress-container" id="news-progress-container">
                        <div class="progress-bar-wrapper">
                            <div class="progress-bar-fill" id="news-progress-bar"></div>
                        </div>
                        <div class="progress-text" id="news-progress-text">0%</div>
                    </div>
                    <button type="button" class="upload-btn" onclick="uploadNews()">
                        <i class="fas fa-upload"></i>
                        ატვირთვა
                    </button>
                </form>
            </div>

            <div class="items-section">
                <h3><i class="fas fa-list"></i> ატვირთული ამბები</h3>
                <div id="news-items" class="items-grid"></div>
            </div>
        </div>

        <!-- Events Tab -->
        <div id="events-tab" class="tab-content">
            <div class="upload-section">
                <h3><i class="fas fa-cloud-upload-alt"></i> ღონისძიების დამატება</h3>
                <form id="events-form">
                    <div class="form-group">
                        <label class="form-label">სათაური</label>
                        <input type="text" id="events-title" class="form-input" placeholder="შეიყვანეთ სათაური..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">ტექსტი</label>
                        <textarea id="events-text" class="form-textarea" placeholder="შეიყვანეთ ტექსტი..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">სურათი</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="events-image" accept="image/*" onchange="updateFileName(this, 'events-file-name')" required>
                            <label for="events-image" class="file-input-label">
                                <i class="fas fa-image"></i>
                                <span>აირჩიეთ სურათი</span>
                            </label>
                        </div>
                        <div id="events-file-name" class="file-name"></div>
                    </div>
                    <div class="progress-container" id="events-progress-container">
                        <div class="progress-bar-wrapper">
                            <div class="progress-bar-fill" id="events-progress-bar"></div>
                        </div>
                        <div class="progress-text" id="events-progress-text">0%</div>
                    </div>
                    <button type="button" class="upload-btn" onclick="uploadEvent()">
                        <i class="fas fa-upload"></i>
                        ატვირთვა
                    </button>
                </form>
            </div>

            <div class="items-section">
                <h3><i class="fas fa-list"></i> ატვირთული ღონისძიებები</h3>
                <div id="events-items" class="items-grid"></div>
            </div>
        </div>

        <!-- Articles Tab -->
        <div id="articles-tab" class="tab-content">
            <div class="upload-section">
                <h3><i class="fas fa-cloud-upload-alt"></i> სტატიის დამატება</h3>
                <form id="articles-form">
                    <div class="form-group">
                        <label class="form-label">სათაური</label>
                        <input type="text" id="articles-title" class="form-input" placeholder="შეიყვანეთ სათაური..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">ტექსტი</label>
                        <textarea id="articles-text" class="form-textarea" placeholder="შეიყვანეთ ტექსტი..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">სურათი</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="articles-image" accept="image/*" onchange="updateFileName(this, 'articles-file-name')" required>
                            <label for="articles-image" class="file-input-label">
                                <i class="fas fa-image"></i>
                                <span>აირჩიეთ სურათი</span>
                            </label>
                        </div>
                        <div id="articles-file-name" class="file-name"></div>
                    </div>
                    <div class="progress-container" id="articles-progress-container">
                        <div class="progress-bar-wrapper">
                            <div class="progress-bar-fill" id="articles-progress-bar"></div>
                        </div>
                        <div class="progress-text" id="articles-progress-text">0%</div>
                    </div>
                    <button type="button" class="upload-btn" onclick="uploadArticle()">
                        <i class="fas fa-upload"></i>
                        ატვირთვა
                    </button>
                </form>
            </div>

            <div class="items-section">
                <h3><i class="fas fa-list"></i> ატვირთული სტატიები</h3>
                <div id="articles-items" class="items-grid"></div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notification-text"></span>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/7.14.2/firebase.js"></script>
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBpfkkOznjSvyyaEWNsG00huwlA8ObY6j8",
            authDomain: "chat-80d74.firebaseapp.com",
            databaseURL: "https://chat-80d74-default-rtdb.firebaseio.com",
            projectId: "chat-80d74",
            storageBucket: "chat-80d74.appspot.com",
            messagingSenderId: "1085559718603",
            appId: "1:1085559718603:web:c7a9a7f26b1535d080514e"
        };
        firebase.initializeApp(firebaseConfig);

        // Tab Switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');

            // Load data
            if (tabName === 'news') loadNews();
            else if (tabName === 'events') loadEvents();
            else if (tabName === 'articles') loadArticles();
        }

        // File name display
        function updateFileName(input, displayId) {
            const display = document.getElementById(displayId);
            if (input.files.length > 0) {
                display.textContent = '📎 ' + input.files[0].name;
            }
        }

        // Notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notification-text');
            const icon = notification.querySelector('i');

            notification.className = 'notification ' + type;
            notificationText.textContent = message;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle';
            } else {
                icon.className = 'fas fa-exclamation-circle';
            }

            notification.style.display = 'flex';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // ==================== NEWS FUNCTIONS ====================
        function uploadNews() {
            const image = document.getElementById('news-image').files[0];
            const title = document.getElementById('news-title').value;
            const text = document.getElementById('news-text').value;

            if (!image || !title || !text) {
                showNotification('გთხოვთ შეავსოთ ყველა ველი', 'error');
                return;
            }

            const progressContainer = document.getElementById('news-progress-container');
            const progressBar = document.getElementById('news-progress-bar');
            const progressText = document.getElementById('news-progress-text');

            progressContainer.style.display = 'block';

            const imageName = 'news_' + Date.now() + '_' + image.name;
            const storageRef = firebase.storage().ref('images/' + imageName);
            const uploadTask = storageRef.put(image);

            uploadTask.on('state_changed',
                function(snapshot) {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressBar.style.width = progress + '%';
                    progressText.textContent = Math.round(progress) + '%';
                },
                function(error) {
                    showNotification('ატვირთვა ვერ მოხერხდა: ' + error.message, 'error');
                    progressContainer.style.display = 'none';
                },
                function() {
                    uploadTask.snapshot.ref.getDownloadURL().then(function(downloadURL) {
                        firebase.database().ref('news/').push().set({
                            title: title,
                            text: text,
                            imageURL: downloadURL
                        }, function(error) {
                            if (error) {
                                showNotification('შეცდომა მონაცემების შენახვისას', 'error');
                            } else {
                                showNotification('წარმატებით აიტვირთა!', 'success');
                                document.getElementById('news-form').reset();
                                document.getElementById('news-file-name').textContent = '';
                                progressContainer.style.display = 'none';
                                progressBar.style.width = '0%';
                                loadNews();
                            }
                        });
                    });
                }
            );
        }

        function loadNews() {
            firebase.database().ref('news/').once('value').then(function(snapshot) {
                const container = document.getElementById('news-items');
                const data = snapshot.val();

                if (!data) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>ჯერ არაფერია ატვირთული</p></div>';
                    return;
                }

                container.innerHTML = '';
                for (let [key, value] of Object.entries(data)) {
                    const title = value.title || 'უსათაურო';
                    const text = value.text || '';
                    container.innerHTML += `
                        <div class="item-card">
                            <img src="${value.imageURL}" class="item-card-image" alt="News">
                            <div class="item-card-content">
                                <h4 class="item-card-title">${title}</h4>
                                <p class="item-card-text">${text}</p>
                                <button class="delete-btn" onclick="deleteNews('${key}')">
                                    <i class="fas fa-trash-alt"></i>
                                    წაშლა
                                </button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function deleteNews(key) {
            if (confirm('დარწმუნებული ხართ რომ გსურთ წაშლა?')) {
                firebase.database().ref('news/' + key).remove();
                showNotification('წარმატებით წაიშალა', 'success');
                loadNews();
            }
        }

        // ==================== EVENTS FUNCTIONS ====================
        function uploadEvent() {
            const image = document.getElementById('events-image').files[0];
            const title = document.getElementById('events-title').value;
            const text = document.getElementById('events-text').value;

            if (!image || !title || !text) {
                showNotification('გთხოვთ შეავსოთ ყველა ველი', 'error');
                return;
            }

            const progressContainer = document.getElementById('events-progress-container');
            const progressBar = document.getElementById('events-progress-bar');
            const progressText = document.getElementById('events-progress-text');

            progressContainer.style.display = 'block';

            const imageName = 'event_' + Date.now() + '_' + image.name;
            const storageRef = firebase.storage().ref('events/' + imageName);
            const uploadTask = storageRef.put(image);

            uploadTask.on('state_changed',
                function(snapshot) {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressBar.style.width = progress + '%';
                    progressText.textContent = Math.round(progress) + '%';
                },
                function(error) {
                    showNotification('ატვირთვა ვერ მოხერხდა: ' + error.message, 'error');
                    progressContainer.style.display = 'none';
                },
                function() {
                    uploadTask.snapshot.ref.getDownloadURL().then(function(downloadURL) {
                        firebase.database().ref('events/').push().set({
                            title: title,
                            text: text,
                            imageURL: downloadURL
                        }, function(error) {
                            if (error) {
                                showNotification('შეცდომა მონაცემების შენახვისას', 'error');
                            } else {
                                showNotification('წარმატებით აიტვირთა!', 'success');
                                document.getElementById('events-form').reset();
                                document.getElementById('events-file-name').textContent = '';
                                progressContainer.style.display = 'none';
                                progressBar.style.width = '0%';
                                loadEvents();
                            }
                        });
                    });
                }
            );
        }

        function loadEvents() {
            firebase.database().ref('events/').once('value').then(function(snapshot) {
                const container = document.getElementById('events-items');
                const data = snapshot.val();

                if (!data) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>ჯერ არაფერია ატვირთული</p></div>';
                    return;
                }

                container.innerHTML = '';
                for (let [key, value] of Object.entries(data)) {
                    const title = value.title || 'უსათაურო';
                    const text = value.text || '';
                    container.innerHTML += `
                        <div class="item-card">
                            <img src="${value.imageURL}" class="item-card-image" alt="Event">
                            <div class="item-card-content">
                                <h4 class="item-card-title">${title}</h4>
                                <p class="item-card-text">${text}</p>
                                <button class="delete-btn" onclick="deleteEvent('${key}')">
                                    <i class="fas fa-trash-alt"></i>
                                    წაშლა
                                </button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function deleteEvent(key) {
            if (confirm('დარწმუნებული ხართ რომ გსურთ წაშლა?')) {
                firebase.database().ref('events/' + key).remove();
                showNotification('წარმატებით წაიშალა', 'success');
                loadEvents();
            }
        }

        // Load initial data
